name: 🎲 California Fantasy 5 Lottery Automation

on:
  schedule:
    # 每天晚上 22:00 (台灣時間) - 加州Fantasy 5完整流程
    - cron: '0 14 * * *'   # UTC 14:00 = 台灣 22:00
  workflow_dispatch: {} # 允許手動觸發

jobs:
  daily-fantasy5-process:
    runs-on: ubuntu-latest
    
    steps:
    - name: 🔄 Checkout repository
      uses: actions/checkout@v4
      
    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: 🌐 Setup Chrome for Selenium
      run: |
        wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: 🔐 Setup Google Drive credentials
      env:
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      run: |
        echo "$GOOGLE_CREDENTIALS" > credentials.json
        
    # ========================================================
    # 下載歷史資料區
    # ========================================================
    - name: ⬇️ Download existing Fantasy 5 history
      env:
        FANTASY5_HIST_FILE_ID: ${{ secrets.FANTASY5_HIST_FILE_ID }}
      run: python scripts/download_fantasy5_from_drive.py
        
    # ========================================================
    
    # --- 天天樂爬蟲更新 ---
    - name: 🎯 Crawl latest Fantasy 5 results (記錄昨天開獎)
      run: python fantasy5_crawler.py
      
    - name: ⬆️ Update Fantasy 5 history to Google Drive
      env:
        FANTASY5_HIST_FILE_ID: ${{ secrets.FANTASY5_HIST_FILE_ID }}
      run: python scripts/upload_fantasy5_hist.py
      
    # --- 週一冠軍策略分析（僅週二執行） ---
    # 下載現有的週一策略檔案
    - name: ⬇️ Download existing Fantasy5 Monday Strategy (Tuesday only)
      env:
        FANTASY5_MONDAY_STRATEGY_FILE_ID: ${{ secrets.FANTASY5_MONDAY_STRATEGY_FILE_ID }}
      run: |
        DAY_OF_WEEK=$(date -u +%u)
        if [ "$DAY_OF_WEEK" = "2" ]; then
          echo "📅 今天是週二，下載現有的週一策略檔案..."
          python scripts/download_fantasy5_monday_strategy.py
        else
          echo "⏭️ 今天不是週二，跳過下載週一策略檔案"
        fi
      
    # 執行週一冠軍策略分析
    - name: 🎯 Add Monday Strategy Analysis Sheet (Tuesday only)
      run: |
        DAY_OF_WEEK=$(date -u +%u)
        if [ "$DAY_OF_WEEK" = "2" ]; then
          echo "📅 今天是週二，執行週一冠軍策略分析..."
          python scripts/add_strategy_sheet.py --type fantasy5 --file fantasy5_hist.xlsx
        else
          echo "⏭️ 今天不是週二，跳過週一冠軍策略分析"
        fi
      
    # 上傳週一策略檔案
    - name: ⬆️ Upload Fantasy5 Monday Strategy (Tuesday only)
      env:
        FANTASY5_MONDAY_STRATEGY_FILE_ID: ${{ secrets.FANTASY5_MONDAY_STRATEGY_FILE_ID }}
      run: |
        DAY_OF_WEEK=$(date -u +%u)
        if [ "$DAY_OF_WEEK" = "2" ]; then
          echo "📅 今天是週二，上傳週一策略檔案..."
          python scripts/upload_fantasy5_monday_strategy.py
        else
          echo "⏭️ 今天不是週二，跳過上傳週一策略檔案"
        fi
      
    # --- 預測與驗證區 ---
    - name: ⬇️ Download Fantasy 5 prediction log
      env:
        FANTASY5_PREDICTION_LOG_FILE_ID: ${{ secrets.FANTASY5_PREDICTION_LOG_FILE_ID }}
      run: python scripts/download_fantasy5_prediction_log.py
      
    - name: 🔍 Verify yesterday's Fantasy 5 predictions
      run: python verify_fantasy5_predictions.py
      
    - name: 📊 Generate today's Fantasy 5 EV predictions
      run: python fantasy5_prediction_only.py

    # ========================================================
    # ★ 每週日執行進階策略分析 (天天樂：一年+近三個月雙欄，產出 best_strategies_fantasy5.xlsx)
    # ========================================================
    - name: 🧠 Run Advanced Strategy Analysis (Fantasy5, weekly Sunday)
      env:
        GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        BEST_STRATEGIES_FANTASY5_FILE_ID: ${{ secrets.BEST_STRATEGIES_FANTASY5_FILE_ID }}
      run: |
        DAY_OF_WEEK=$(date -u +%u)
        if [ "$DAY_OF_WEEK" = "7" ]; then
          echo "📅 週日：執行天天樂進階策略分析（一年+三個月）..."
          python auto_analyze_strategies.py --type fantasy5
        else
          echo "⏭️ 非週日，跳過進階策略分析"
        fi
      
    # --- 上傳與歸檔 ---
    - name: ⬆️ Upload Fantasy 5 Prediction Log
      env:
        FANTASY5_PREDICTION_LOG_FILE_ID: ${{ secrets.FANTASY5_PREDICTION_LOG_FILE_ID }}
        GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
      run: python scripts/upload_fantasy5_to_drive.py
      
    - name: 📋 Archive daily results
      uses: actions/upload-artifact@v4
      with:
        name: daily-fantasy5-process-${{ github.run_number }}
        path: |
          fantasy5_hist.xlsx
          fantasy5_prediction_log.xlsx
          best_strategies_fantasy5.xlsx
          fantasy5_monday_strategy.xlsx
          *.log
        retention-days: 30