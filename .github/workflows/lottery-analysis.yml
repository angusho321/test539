name: 🎲 539 Lottery Automation

on:
  schedule:
    # 每天上午 9:00 (台灣時間) - 完整流程：記錄開獎+驗證昨日+預測今日
    - cron: '0 1 * * *'   # UTC 01:00 = 台灣時間 09:00
  workflow_dispatch: {} # 允許手動觸發

jobs:
  # 早上執行：記錄開獎+驗證昨日+預測今日（週一到週六）
  daily-lottery-process:
    runs-on: ubuntu-latest
    
    steps:
    - name: 🔄 Checkout repository
      uses: actions/checkout@v4
      
    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🔐 Setup Google Drive credentials
      env:
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      run: |
        echo "$GOOGLE_CREDENTIALS" > credentials.json
        
    # 檢查是否為週日（539 週日不開獎）
    - name: 📅 Check if Sunday (skip lottery on Sunday)
      id: check_sunday
      run: |
        DAY_OF_WEEK=$(date -u +%u)
        if [ "$DAY_OF_WEEK" = "7" ]; then
          echo "is_sunday=true" >> $GITHUB_OUTPUT
          echo "📅 今天是週日，539 不開獎，跳過預測流程"
        else
          echo "is_sunday=false" >> $GITHUB_OUTPUT
          echo "📅 今天不是週日，執行正常流程"
        fi
    
    # 檢查是否為週二（539 週一策略執行日）
    - name: 📅 Check if Tuesday (Monday Strategy execution day)
      id: check_tuesday
      run: |
        DAY_OF_WEEK=$(date -u +%u)
        if [ "$DAY_OF_WEEK" = "2" ]; then
          echo "is_tuesday=true" >> $GITHUB_OUTPUT
          echo "📅 今天是週二，執行週一策略分析"
        else
          echo "is_tuesday=false" >> $GITHUB_OUTPUT
          echo "📅 今天不是週二，跳過週一策略分析"
        fi
    
    # 步驟 1: 記錄昨天的開獎號碼（每天執行，包括週日）
    - name: ⬇️ Download existing lottery history
      env:
        LOTTERY_HIST_FILE_ID: ${{ secrets.LOTTERY_HIST_FILE_ID }}
      run: python scripts/download_from_drive.py
        
    - name: 🔄 Ensure complete lottery history (one-time setup)
      run: |
        echo "📊 檢查歷史記錄完整性..."
        python -c "
        import pandas as pd
        from pathlib import Path
        if Path('lottery_hist.xlsx').exists():
            df = pd.read_excel('lottery_hist.xlsx')
            print(f'目前記錄筆數: {len(df)}')
            if len(df) < 1500:
                print('⚠️ 記錄不完整，執行完整更新...')
                exit(1)
            else:
                print('✅ 歷史記錄完整')
        else:
            print('❌ 沒有歷史檔案')
            exit(1)
        " || python scripts/update_lottery_history_with_taiwanlottery.py
        
    - name: 🎯 Crawl latest lottery results (記錄昨天開獎)
      run: python lottery_crawler.py
      
    - name: ⬆️ Update lottery history to Google Drive
      env:
        LOTTERY_HIST_FILE_ID: ${{ secrets.LOTTERY_HIST_FILE_ID }}
      run: python scripts/upload_lottery_hist.py
      
    # 步驟 1.5: 下載現有的週一策略檔案（僅週二執行）
    - name: ⬇️ Download existing 539 Monday Strategy (Tuesday only)
      if: steps.check_tuesday.outputs.is_tuesday == 'true'
      env:
        MONDAY_STRATEGY_539_FILE_ID: ${{ secrets.MONDAY_STRATEGY_539_FILE_ID }}
      run: python scripts/download_539_monday_strategy.py
      
    # 步驟 1.6: 執行週一冠軍策略分析（僅週二執行）
    - name: 🎯 Add Monday Strategy Analysis Sheet (Tuesday only)
      if: steps.check_tuesday.outputs.is_tuesday == 'true'
      run: |
        echo "📅 今天是週二，執行週一冠軍策略分析..."
        python scripts/add_strategy_sheet.py --type 539 --file lottery_hist.xlsx
      
    # 步驟 1.7: 上傳週一策略檔案（僅週二執行）
    - name: ⬆️ Upload 539 Monday Strategy (Tuesday only)
      if: steps.check_tuesday.outputs.is_tuesday == 'true'
      env:
        MONDAY_STRATEGY_539_FILE_ID: ${{ secrets.MONDAY_STRATEGY_539_FILE_ID }}
      run: python scripts/upload_539_monday_strategy.py
      
    # 步驟 2: 驗證昨日的預測（週日跳過）
    - name: ⬇️ Download prediction log
      if: steps.check_sunday.outputs.is_sunday != 'true'
      env:
        PREDICTION_LOG_FILE_ID: ${{ secrets.PREDICTION_LOG_FILE_ID }}
      run: python scripts/download_prediction_log.py
      
    - name: 🔍 Verify yesterday's predictions
      if: steps.check_sunday.outputs.is_sunday != 'true'
      run: python verify_predictions.py
      
    # 步驟 3: 預測今日的號碼（週日跳過）
    - name: 📊 Generate today's Smart+EV predictions
      if: steps.check_sunday.outputs.is_sunday != 'true'
      run: python lottery_prediction_only.py
    
    # 步驟 4: 每週日執行進階策略分析 (539：一年+近三個月雙欄，產出 best_strategies_539.xlsx)
    - name: 🧠 Run Advanced Strategy Analysis (539, weekly Sunday)
      env:
        GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        BEST_STRATEGIES_539_FILE_ID: ${{ secrets.BEST_STRATEGIES_539_FILE_ID }}
      run: |
        DAY_OF_WEEK=$(date -u +%u)
        if [ "$DAY_OF_WEEK" = "7" ]; then
          echo "📅 週日：執行 539 進階策略分析（一年+三個月）..."
          python auto_analyze_strategies.py --type 539
        else
          echo "⏭️ 非週日，跳過進階策略分析"
        fi
      
    - name: ⬆️ Upload all results to Google Drive
      env:
        PREDICTION_LOG_FILE_ID: ${{ secrets.PREDICTION_LOG_FILE_ID }}
        GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
      run: |
        # 週日可能沒有預測記錄，但還是嘗試上傳（如果文件存在）
        if [ -f "prediction_log.xlsx" ]; then
          python scripts/upload_to_drive.py
        else
          echo "📅 週日無預測記錄，跳過上傳預測記錄"
        fi
      
    - name: 📋 Archive daily results
      uses: actions/upload-artifact@v4
      with:
        name: daily-lottery-process-${{ github.run_number }}
        path: |
          lottery_hist.xlsx
          prediction_log.xlsx
          best_strategies_539.xlsx
          539_monday_strategy.xlsx
          *.log
        retention-days: 30
